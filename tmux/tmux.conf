set -g default-shell /bin/zsh
set -g update-environment "DISPLAY XAUTHORITY"
set -g history-limit 10000
set -g mode-keys vi
set -g base-index 1
set-option -g renumber-windows on
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"

set -g mode-style "fg=black,bg=yellow"

# Pane border with directional arrows
set -g pane-border-indicators arrows

# Github Dark theme (must come before window-status overrides below)
source-file ~/.personal-plugins/github-theme-contrib/themes/tmux/github_dark.conf

# Status bar turns red in copy/scroll mode (must come after theme to override it)
set -g status-style '#{?pane_in_mode,bg=red fg=white,bg=#e6edf3 fg=#2f81f7}'

# Window status: show ⏳ when a claude session has been running > 10s
# (overrides the theme's default window-status-format)
setw -g window-status-separator "│"
setw -g window-status-current-format "#[fg=#e6edf3,bg=#{?window_zoomed_flag,#e3b341,#3fb950},nobold,nounderscore,noitalics]#[fg=#30363d,bg=#{?window_zoomed_flag,#e3b341,#3fb950},bold] #I #W#{?#{&&:#{||:#{==:#{window_name},claude},#{==:#{pane_current_command},claude}},#{>:#{e|-:#(date +%s),#{window_activity}},10}}, ⏳,} #[fg=#{?window_zoomed_flag,#e3b341,#3fb950},bg=#e6edf3,nobold,nounderscore,noitalics]"
setw -g window-status-format         "#[fg=#e6edf3,bg=#babbbd,nobold,nounderscore,noitalics]#[fg=#30363d,bg=#babbbd,nobold,nounderscore,noitalics] #I #W#{?#{&&:#{||:#{==:#{window_name},claude},#{==:#{pane_current_command},claude}},#{>:#{e|-:#(date +%s),#{window_activity}},10}}, ⏳,} #[fg=#babbbd,bg=#e6edf3,nobold,nounderscore,noitalics]"

# Plugins (managed by tpm: prefix + I to install)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
run '~/.tmux/plugins/tpm/tpm'

# Window insert/reorder (prefix + Alt+i)
bind-key M-i command-prompt -p "Insert before index:" "run-shell '~/.tmux/insert_window.sh %%'"
